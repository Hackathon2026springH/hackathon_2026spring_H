{% extends "base.html" %}

{% block title %}ログイン - ゆるトレボード{% endblock %}
{% block page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<!-- ログインフォーム -->
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <div class="flex flex-col items-center mb-8">
            <div class="bg-orange-100 p-4 rounded-full mb-4">
                <span class="w-12 h-12 text-orange-500 inline-flex items-center justify-center"> &nbsp; </span>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">ゆるトレボード</h1>
            <p class="text-gray-600 mt-2">ログイン</p>
        </div>

        <form method="post" class="space-y-6">
            <div>
                <label for="email_address" class="block text-sm font-medium text-gray-700 mb-2">
                    メールアドレス
                </label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400">✉️</span>
                    <input
                        id="email_address"
                        name="email_address"
                        type="email"
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                        placeholder="メールアドレスを入力してください"
                        required
                    />
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                    パスワード
                </label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400">🔒</span>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                        placeholder="パスワードを入力してください"
                        required
                    />
                </div>
            </div>

            <button
                type="submit"
                className="w-full bg-orange-500 text-white py-3 rounded-lg font-semibold hover:bg-orange-600 transition-colors shadow-md hover:shadow-lg"
            >
            ログイン
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-gray-600">
            アカウントをお持ちでない方は
            <a
                href="{{ url_for('auth.signup') }}"
                class="text-orange-500 font-semibold hover:underline ml-1"
            >
                新規登録
            </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

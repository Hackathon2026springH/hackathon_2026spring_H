<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <title>ゆるトレボード</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div class="container mt-4" style="max-width: 680px;">
    <div class="border rounded-3 p-4 shadow-sm">
    <h1>新規ポスト作成</h1><br>
    <h6>トレーニング内容を入力してください。</h6><br>
<form action="/threads/{{ thread_id }}/posts" method="POST" enctype="multipart/form-data">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="mb-3">
    <label for="trainingCount" class="form-label">回数</label>
    <input type="number" class="form-control" id="trainingCount" name="count">
  </div>
    <div class="mb-3">
    <label for="trainingReps" class="form-label">レップ数</label>
    <input type="number" class="form-control" id="trainingReps" name="reps">
  </div>
  <div class="mb-3">
  <label for="exampleFormControlTextarea1" class="form-label">コメント</label>
  <textarea class="form-control" id="exampleFormControlTextarea1" name="memo" rows="3"></textarea>
</div>

  <!-- 画像投稿フォーム -->
   <div class="mb-3">
    <label for="thread_image" class="form-label">画像</label>
    <input type="file" class="form-control" id="thread_image" name="image" accept="image/*">
  </div>



  <button type="submit" class="btn btn-primary">作成</button>
  <a href="/threads/{{ thread_id }}" class="btn btn-secondary">キャンセル</a>
</form>
</div>
</div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmF2XEd6ERiXs0mJI9jvAqBDsP0" crossorigin="anonymous"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <title>ゆるトレボード</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4" style="max-width: 680px;">

  <h2 class="fw-bold mb-3">だいふくのスレッド一覧</h2>

  <!-- スレッド1 -->
  <div class="card mb-3 shadow-sm rounded-3 border-0" style="background-color:#e8f5e9;">
    <div class="card-body p-4">
      <div class="d-flex align-items-center mb-3">
        <span class="fw-bold px-2 py-1 rounded-3 me-2" style="background-color:#808cff;">だいふく</span>
        <button class="btn btn-outline-secondary btn-sm py-0">フォロー</button>
        <span class="badge mx-2" style="background-color:#2bd97c; color:white;">ゆる</span>
        <small class="text-muted ms-auto">2026/05/01 08:00</small>
      </div>
      <a href="#" class="btn btn-link fw-bold mb-3 p-0 text-dark">毎日腕立て30回！</a>
      <div class="bg-light rounded-3 p-3 mb-2">
        <div class="d-flex align-items-start justify-content-between">
          <div>
            <div class="d-flex align-items-end gap-2">
              <span class="fw-bold" style="font-size:1.8rem; line-height:1;">30</span>
              <span class="text-muted mb-1">回</span>
              <span class="fw-bold ms-2" style="font-size:1.8rem; line-height:1;">3</span>
              <span class="text-muted mb-1">セット</span>
            </div>
          </div>
          <div class="text-end me-2" style="max-width:40%;">
            <small class="text-muted d-block mb-1">2026/05/07 09:00</small>
            <span class="text-muted">今日も達成！</span>
          </div>
        </div>
      </div>
      <div class="d-flex gap-4 mt-3 text-muted align-items-center">
        <span class="d-flex align-items-center gap-1">
          <span class="badge rounded-pill text-dark" style="background-color:#fc5d5d;">がんばれ!</span>
          <span>5</span>
        </span>
        <span class="d-flex align-items-center gap-1">
          <span>💬</span>
          <span>2</span>
        </span>
      </div>
    </div>
  </div>

  <!-- スレッド2 -->
  <div class="card mb-3 shadow-sm rounded-3 border-0" style="background-color:#e8f5e9;">
    <div class="card-body p-4">
      <div class="d-flex align-items-center mb-3">
        <span class="fw-bold px-2 py-1 rounded-3 me-2" style="background-color:#808cff;">だいふく</span>
        <button class="btn btn-outline-secondary btn-sm py-0">フォロー</button>
        <span class="badge mx-2" style="background-color:#2bd97c; color:white;">ゆる</span>
        <small class="text-muted ms-auto">2026/04/20 10:30</small>
      </div>
      <a href="#" class="btn btn-link fw-bold mb-3 p-0 text-dark">毎日スクワット50回！</a>
      <div class="bg-light rounded-3 p-3 mb-2">
        <div class="d-flex align-items-start justify-content-between">
          <div>
            <div class="d-flex align-items-end gap-2">
              <span class="fw-bold" style="font-size:1.8rem; line-height:1;">50</span>
              <span class="text-muted mb-1">回</span>
            </div>
          </div>
          <div class="text-end me-2" style="max-width:40%;">
            <small class="text-muted d-block mb-1">2026/05/06 21:00</small>
            <span class="text-muted">きつかった…</span>
          </div>
        </div>
      </div>
      <div class="d-flex gap-4 mt-3 text-muted align-items-center">
        <span class="d-flex align-items-center gap-1">
          <span class="badge rounded-pill text-dark" style="background-color:#fc5d5d;">すごい!</span>
          <span>3</span>
        </span>
        <span class="d-flex align-items-center gap-1">
          <span>💬</span>
          <span>1</span>
        </span>
      </div>
    </div>
  </div>

</div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmF2XEd6ERiXs0mJI9jvAqBDsP0" crossorigin="anonymous"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <title>ゆるトレボード</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div class="container mt-4" style="max-width: 680px;">
    <div class="border rounded-3 p-4 shadow-sm">
    <h1>新規スレッド作成</h1><br>
    <h6>トレーニング目標とその趣旨を入力してください。</h6><br>
<form>
  <div class="mb-3">
    <label for="trainingGoal" class="form-label">トレーニング目標</label>
    <input type="text" class="form-control" id="trainingGoal">
  </div>
  <div class="mb-3">
    <label for="trainingPurpose" class="form-label">趣旨</label><br>
    <button type="button" class="btn" style="background-color:#32a89d; color:white;">ゆるゆる</button>
    <button type="button" class="btn" style="background-color:#2bd97c; color:white;">ゆる</button>
    <button type="button" class="btn" style="background-color:#ffc107; color:white;">普通</button>
    <button type="button" class="btn" style="background-color:#f0430a; color:white;">ガチ</button>
    <button type="button" class="btn" style="background-color:#f00ae4; color:white;">ガチガチ</button>
  </div><br>

  <button type="submit" class="btn btn-primary">作成</button>
  <button type="button" class="btn btn-secondary">キャンセル</button>
</form>
</div>
</div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmF2XEd6ERiXs0mJI9jvAqBDsP0" crossorigin="anonymous"></script>
</body>
</html>
